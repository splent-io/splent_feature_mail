[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_mail"
version = "1.2.1"
requires-python = ">=3.13"
authors = [{ name = "DiversoLab", email = "diversolab@us.es" }]
dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

# ── Feature Contract (auto-generated by splent feature:release) ───────────────
# Do not edit manually — re-run `splent feature:release` to refresh.
[tool.splent.contract]
description = "Mail feature: provides MailService for transactional email sending"

[tool.splent.contract.provides]
routes     = ["/mail"]
blueprints = ["mail_bp"]
models     = []
commands   = []
hooks      = []
services   = ["MailService"]
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = ["MAIL_PASSWORD", "MAIL_PORT", "MAIL_SERVER", "MAIL_USERNAME", "MAIL_USE_SSL", "MAIL_USE_TLS"]
