[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_mail"
version = "1.3.4"
readme = "README.md"
requires-python = ">=3.13"

dependencies = []

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

[tool.splent]
cli_version = "1.3.0"

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "Email sending via Flask-Mail with SMTP configuration"

[tool.splent.contract.provides]
routes     = []
blueprints = ["mail_bp"]
models     = []
commands   = ["config", "test"]
hooks      = []
services   = []
signals    = ["email-sent"]
translations = []
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = ["MAIL_DEFAULT_SENDER", "MAIL_PASSWORD", "MAIL_PORT", "MAIL_SERVER", "MAIL_USERNAME", "MAIL_USE_SSL", "MAIL_USE_TLS"]
signals  = []

[tool.splent.contract.extensible]
services  = ["MailService"]
templates = []
models    = []
hooks     = []
routes    = false
